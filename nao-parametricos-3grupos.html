<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Testes Não-Paramétricos para 3+ Grupos — Odin Dinho</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Patrick+Hand&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
:root {
  --bg-dark: #0d1117; --bg-card: #161b22; --bg-panel: #1c2333;
  --odin-blue: #58a6ff; --thor-red: #f85149; --corvo-purple: #bc8cff;
  --gold: #f0c040; --silver: #8b949e; --text: #e6edf3; --text-dim: #8b949e;
  --success: #3fb950; --border: #30363d;
  --birka-color: #58a6ff; --hedeby-color: #f85149; --kaupang-color: #3fb950;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Patrick Hand', cursive;
  background: var(--bg-dark);
  color: var(--text);
  min-height: 100vh;
  font-size: 18px;
  line-height: 1.5;
  overflow-x: hidden;
}
.container { max-width: 960px; margin: 0 auto; padding: 20px; }

/* PROGRESS BAR */
.progress-bar {
  position: fixed; top: 0; left: 0; width: 100%; height: 6px;
  background: var(--bg-panel); z-index: 1000;
}
.progress-fill {
  height: 100%; background: linear-gradient(90deg, var(--odin-blue), var(--corvo-purple), var(--gold));
  transition: width 0.5s ease; border-radius: 0 3px 3px 0;
}

/* HEADER */
.header {
  text-align: center; padding: 30px 0 10px;
}
.header h1 {
  font-family: 'Permanent Marker', cursive;
  font-size: clamp(1.6rem, 4vw, 2.4rem);
  background: linear-gradient(135deg, var(--odin-blue), var(--corvo-purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header .subtitle {
  font-family: 'Patrick Hand', cursive;
  color: var(--silver); font-size: 1.1rem; margin-top: 6px;
}

/* STEP INDICATOR */
.step-indicator {
  display: flex; justify-content: center; flex-wrap: wrap; gap: 6px;
  margin: 16px 0 20px;
}
.step-dot {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--bg-panel); border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem; cursor: pointer; transition: all 0.3s;
  color: var(--text-dim);
}
.step-dot.active { border-color: var(--odin-blue); background: var(--odin-blue); color: #fff; transform: scale(1.15); }
.step-dot.completed { border-color: var(--success); background: var(--success); color: #fff; }
.step-dot.part-b { border-color: var(--corvo-purple); }
.step-dot.part-b.active { background: var(--corvo-purple); border-color: var(--corvo-purple); }

/* SLIDES */
.slide {
  display: none; opacity: 0;
  animation: fadeIn 0.4s ease forwards;
}
.slide.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

/* CARDS */
.card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 12px; padding: 24px; margin: 16px 0;
}
.card h2 {
  font-family: 'Bangers', cursive; font-size: 1.6rem;
  color: var(--gold); margin-bottom: 12px; letter-spacing: 1px;
}
.card h3 {
  font-family: 'Bangers', cursive; font-size: 1.3rem;
  color: var(--odin-blue); margin: 14px 0 8px;
}

/* DIALOGUE BOXES */
.dialogue-box {
  border-radius: 10px; padding: 14px 18px; margin: 12px 0;
  border-left: 4px solid; position: relative;
}
.dialogue-box.odin { background: rgba(88,166,255,0.08); border-color: var(--odin-blue); }
.dialogue-box.thor { background: rgba(248,81,73,0.08); border-color: var(--thor-red); }
.dialogue-box.corvo { background: rgba(188,140,255,0.08); border-color: var(--corvo-purple); }
.char-name {
  font-family: 'Bangers', cursive; font-size: 1.05rem; margin-bottom: 4px;
}
.char-name.odin { color: var(--odin-blue); }
.char-name.thor { color: var(--thor-red); }
.char-name.corvo { color: var(--corvo-purple); }
.dialogue-text { font-size: 1rem; line-height: 1.5; }

/* TABLES */
.data-table {
  width: 100%; border-collapse: collapse; margin: 14px 0;
  font-size: 0.95rem;
}
.data-table th {
  background: var(--bg-panel); color: var(--gold);
  font-family: 'Bangers', cursive; letter-spacing: 0.5px;
  padding: 10px 12px; text-align: center; border: 1px solid var(--border);
}
.data-table td {
  padding: 8px 12px; text-align: center; border: 1px solid var(--border);
  transition: all 0.4s;
}
.data-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

/* COLOR CLASSES */
.birka { color: var(--birka-color); }
.hedeby { color: var(--hedeby-color); }
.kaupang { color: var(--kaupang-color); }
.birka-bg { background: rgba(88,166,255,0.15) !important; }
.hedeby-bg { background: rgba(248,81,73,0.15) !important; }
.kaupang-bg { background: rgba(59,185,80,0.15) !important; }

/* FORMULA BOX */
.formula-box {
  background: var(--bg-panel); border: 1px solid var(--gold);
  border-radius: 8px; padding: 16px 20px; margin: 14px 0;
  text-align: center; font-size: 1.15rem; overflow-x: auto;
}
.formula-box .formula { color: var(--gold); font-family: monospace; font-size: 1.1rem; }
.formula-box .calc-step {
  color: var(--text-dim); font-size: 0.95rem; margin-top: 6px;
}

/* NUMBER LINE / RANK BAR */
.rank-visual {
  display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;
  margin: 14px 0;
}
.rank-item {
  display: flex; flex-direction: column; align-items: center;
  padding: 6px 10px; border-radius: 8px; background: var(--bg-panel);
  border: 1px solid var(--border); min-width: 52px;
  opacity: 0; animation: popIn 0.3s ease forwards;
}
.rank-item .rank-num { font-family: 'Bangers', cursive; font-size: 0.85rem; color: var(--silver); }
.rank-item .rank-val { font-size: 1.1rem; font-weight: bold; }
@keyframes popIn { from { opacity:0; transform: scale(0.7); } to { opacity:1; transform: scale(1); } }

/* BAR CHART */
.bar-chart {
  display: flex; align-items: flex-end; justify-content: center;
  gap: 30px; height: 200px; margin: 20px 0; padding: 0 20px;
}
.bar-wrapper { display: flex; flex-direction: column; align-items: center; }
.bar {
  width: 70px; border-radius: 6px 6px 0 0;
  transition: height 1s ease; position: relative;
}
.bar .bar-label {
  position: absolute; top: -26px; width: 100%; text-align: center;
  font-family: 'Bangers', cursive; font-size: 1.1rem;
}
.bar-name { margin-top: 8px; font-family: 'Bangers', cursive; font-size: 1rem; }

/* CHI-SQUARED VISUAL */
.chi2-visual {
  position: relative; height: 180px; margin: 20px 0;
  background: var(--bg-panel); border-radius: 10px;
  border: 1px solid var(--border); overflow: hidden;
}
.chi2-curve { width: 100%; height: 100%; }

/* COMPARISON CARDS */
.comparison-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 14px; margin: 14px 0;
}
.comp-card {
  background: var(--bg-panel); border-radius: 10px; padding: 16px;
  border: 2px solid var(--border); text-align: center;
  transition: border-color 0.4s;
}
.comp-card.significant { border-color: var(--success); }
.comp-card.not-significant { border-color: var(--thor-red); }
.comp-card h4 { font-family: 'Bangers', cursive; font-size: 1.15rem; color: var(--gold); margin-bottom: 8px; }
.comp-card .verdict {
  font-family: 'Bangers', cursive; font-size: 1.1rem;
  padding: 4px 12px; border-radius: 20px; display: inline-block; margin-top: 8px;
}
.comp-card .verdict.sig { background: rgba(59,185,80,0.2); color: var(--success); }
.comp-card .verdict.ns { background: rgba(248,81,73,0.2); color: var(--thor-red); }

/* ANIMATE BUTTON */
.animate-btn {
  display: inline-block; padding: 10px 24px; border-radius: 8px;
  background: linear-gradient(135deg, var(--odin-blue), var(--corvo-purple));
  color: #fff; border: none; font-family: 'Bangers', cursive;
  font-size: 1.1rem; cursor: pointer; letter-spacing: 1px;
  transition: transform 0.2s, box-shadow 0.2s;
  margin: 10px 0;
}
.animate-btn:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(88,166,255,0.3); }
.animate-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* NAVIGATION */
.nav-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 20px 0; margin-top: 10px;
}
.nav-btn {
  padding: 12px 28px; border-radius: 8px; border: 2px solid var(--border);
  background: var(--bg-card); color: var(--text); font-family: 'Bangers', cursive;
  font-size: 1.1rem; cursor: pointer; transition: all 0.3s; letter-spacing: 1px;
}
.nav-btn:hover:not(:disabled) { border-color: var(--odin-blue); background: var(--bg-panel); }
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.nav-btn.next { background: linear-gradient(135deg, var(--odin-blue), var(--corvo-purple)); border: none; }
.nav-btn.next:hover:not(:disabled) { box-shadow: 0 4px 20px rgba(88,166,255,0.3); }
.step-counter { color: var(--silver); font-size: 1rem; }

/* APA BOX */
.apa-box {
  background: var(--bg-panel); border: 2px solid var(--gold);
  border-radius: 10px; padding: 20px; margin: 14px 0;
  text-align: center;
}
.apa-box .apa-result {
  font-family: 'Courier New', monospace; font-size: 1.15rem;
  color: var(--gold); margin: 8px 0; line-height: 1.7;
}

/* DECISION FLOWCHART */
.flowchart {
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  margin: 20px 0;
}
.flow-node {
  background: var(--bg-panel); border: 2px solid var(--border);
  border-radius: 10px; padding: 14px 24px; text-align: center;
  max-width: 320px; width: 100%;
  transition: all 0.4s;
}
.flow-node.decision { border-radius: 10px; border-color: var(--gold); background: rgba(240,192,64,0.08); }
.flow-node.test { border-color: var(--odin-blue); background: rgba(88,166,255,0.1); }
.flow-arrow { font-size: 1.5rem; color: var(--silver); }
.flow-branches { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }

/* PART DIVIDER */
.part-divider {
  text-align: center; padding: 20px 0; margin: 10px 0;
}
.part-divider h2 {
  font-family: 'Permanent Marker', cursive;
  font-size: clamp(1.4rem, 3.5vw, 2rem);
  color: var(--corvo-purple);
}

/* SIGNATURE */
.signature {
  text-align: center; padding: 30px 0 20px;
  color: var(--text-dim); font-size: 0.9rem;
  border-top: 1px solid var(--border); margin-top: 20px;
}

/* RESPONSIVE */
@media (max-width: 640px) {
  .container { padding: 12px; }
  .card { padding: 16px; }
  .bar-chart { height: 160px; gap: 16px; }
  .bar { width: 50px; }
  .comparison-grid { grid-template-columns: 1fr; }
  .step-dot { width: 24px; height: 24px; font-size: 0.6rem; }
}

/* Highlight animation */
.highlight-flash {
  animation: flash 0.6s ease;
}
@keyframes flash {
  0%, 100% { background: transparent; }
  50% { background: rgba(240,192,64,0.25); }
}

/* Tie rank highlight */
.tie-rank { background: rgba(240,192,64,0.2) !important; border: 1px dashed var(--gold) !important; }
</style>
</head>
<body>

<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<div class="container">
  <div class="header">
    <h1>🛡️ Testes Não-Paramétricos para 3+ Grupos</h1>
    <div class="subtitle">Kruskal-Wallis &amp; Friedman — Cálculo passo a passo</div>
  </div>

  <div class="step-indicator" id="stepIndicator"></div>

  <div id="slidesContainer"></div>

  <div class="nav-bar">
    <button class="nav-btn prev" id="btnPrev" onclick="prevStep()">◀ Voltar</button>
    <span class="step-counter" id="stepCounter"></span>
    <button class="nav-btn next" id="btnNext" onclick="nextStep()">Avançar ▶</button>
  </div>

  <div class="signature">Prof. Dr. Leonardo Vils · PPGA · UNINOVE · MTPQI · 2026</div>
</div>

<script>
// ========== DATA ==========
const birka = [45,38,52,41,60,35];
const hedeby = [30,25,33,28,22];
const kaupang = [48,55,42,50,58];
const allVals = [
  ...birka.map(v=>({v,g:'Birka'})),
  ...hedeby.map(v=>({v,g:'Hedeby'})),
  ...kaupang.map(v=>({v,g:'Kaupang'}))
];
const sorted = [...allVals].sort((a,b)=>a.v-b.v);
const N = 16;

// Ranks (no ties in this dataset)
sorted.forEach((item,i)=> item.rank = i+1);
const rankMap = {};
sorted.forEach(item => { if(!rankMap[item.g]) rankMap[item.g]=[]; rankMap[item.g].push({v:item.v, r:item.rank}); });

const R_birka=60, R_hedeby=15, R_kaupang=61;
const n_b=6, n_h=5, n_k=5;
const H_val = 10.2882;
const p_kw = 0.0058;
const eta2 = 0.6376;
const meanR_b=10.0, meanR_h=3.0, meanR_k=12.2;

// Friedman data
const smiths = ['Thor','Brokkr','Eitri','Sindri','Wayland','Völundr','Regin'];
const fData = [[7,5,9],[6,8,7],[4,6,8],[8,4,9],[5,7,6],[3,5,8],[6,6,7]];
const fRanks = [[2,1,3],[1,3,2],[1,2,3],[2,1,3],[1,3,2],[1,2,3],[1.5,1.5,3]];
const R_mart=9.5, R_big=13.5, R_run=19.0;
const chi2_F=6.5, p_fried=0.0388, W_kendall=0.4643;

// ========== DIALOGUE HELPER ==========
function dlg(character, name, text) {
  return `<div class="dialogue-box ${character}"><div class="char-name ${character}">${name}</div><div class="dialogue-text">${text}</div></div>`;
}

// ========== GROUP COLOR HELPER ==========
function gc(group) {
  if(group==='Birka') return 'birka';
  if(group==='Hedeby') return 'hedeby';
  return 'kaupang';
}
function gcBg(group) { return gc(group)+'-bg'; }

// ========== SLIDES CONTENT ==========
const slides = [];

// --- STEP 0: Introdução ---
slides.push({
  title: 'Introdução', partB: false,
  html: `
  <div class="card">
    <h2>⚔️ Passo 0 — Quando a ANOVA não serve</h2>
    ${dlg('odin','🧙‍♂️ Odin Dinho','Quando temos <strong>3 ou mais grupos independentes</strong> e os dados não satisfazem os pressupostos da ANOVA — normalidade, homocedasticidade — recorremos ao <strong>Kruskal-Wallis</strong>.')}
    ${dlg('thor','⚡ ThorMento','ANOVA serve pra tudo! Mete um F-test e pronto!')}
    ${dlg('odin','🧙‍♂️ Odin Dinho','Não quando os dados são <strong>ordinais</strong> ou fortemente assimétricos, ThorMento. Forçar a ANOVA é como forjar espada com ferro frio — o resultado quebra na primeira batalha.')}

    <h3>Mapa Paramétrico → Não-Paramétrico</h3>
    <table class="data-table">
      <tr><th>Situação</th><th>Paramétrico</th><th>Não-Paramétrico</th></tr>
      <tr><td>2 grupos independentes</td><td>Teste t</td><td>Mann-Whitney U</td></tr>
      <tr><td>2 grupos pareados</td><td>Teste t pareado</td><td>Wilcoxon Signed-Rank</td></tr>
      <tr><td style="color:var(--gold);font-weight:bold">3+ grupos independentes</td><td>ANOVA</td><td style="color:var(--gold);font-weight:bold">Kruskal-Wallis ← hoje</td></tr>
      <tr><td style="color:var(--corvo-purple);font-weight:bold">3+ medidas repetidas</td><td>ANOVA MR</td><td style="color:var(--corvo-purple);font-weight:bold">Friedman ← hoje</td></tr>
    </table>

    ${dlg('corvo','🐦‍⬛ Muninn sussurra:','Kruskal-Wallis é a extensão do Mann-Whitney para 3+ grupos. Em vez de comparar medianas diretamente, ele compara <em>distribuições de ranks</em>.')}
  </div>`
});

// --- STEP 1: Ranking ---
slides.push({
  title: 'Ranking Global', partB: false,
  html: `
  <div class="card">
    <h2>📊 Passo 1 — Ranking de Todos os Dados</h2>
    ${dlg('odin','🧙‍♂️ Odin Dinho','Três aldeias viking — <span class="birka">Birka</span> (n=6), <span class="hedeby">Hedeby</span> (n=5) e <span class="kaupang">Kaupang</span> (n=5) — competem na colheita de cevada. Juntamos todos os 16 valores e atribuímos ranks de 1 a 16.')}

    <h3>Dados Originais</h3>
    <table class="data-table">
      <tr><th class="birka">Birka</th><th class="hedeby">Hedeby</th><th class="kaupang">Kaupang</th></tr>
      <tr><td class="birka">45, 38, 52, 41, 60, 35</td><td class="hedeby">30, 25, 33, 28, 22</td><td class="kaupang">48, 55, 42, 50, 58</td></tr>
    </table>

    <h3>Clique para animar o ranking</h3>
    <button class="animate-btn" id="btnRank" onclick="animateRanking()">🎲 Ordenar e Rankear</button>
    <div class="rank-visual" id="rankVisual"></div>

    ${dlg('corvo','🐦‍⬛ Muninn sussurra:','Se houvesse empates, usaríamos a <strong>média dos ranks</strong>. Ex: dois valores iguais nos postos 5 e 6 receberiam ambos rank 5.5. Neste caso, não há empates!')}
  </div>`
});

// --- STEP 2: Rank Sums ---
slides.push({
  title: 'Soma dos Ranks', partB: false,
  html: `
  <div class="card">
    <h2>📐 Passo 2 — Soma dos Ranks por Grupo</h2>

    <table class="data-table">
      <tr><th>Aldeia</th><th>Valores</th><th>Ranks</th><th>Soma (Rⱼ)</th></tr>
      <tr class="birka-bg"><td class="birka"><strong>Birka</strong></td><td>45, 38, 52, 41, 60, 35</td><td>10, 7, 13, 8, 16, 6</td><td><strong>60</strong></td></tr>
      <tr class="hedeby-bg"><td class="hedeby"><strong>Hedeby</strong></td><td>30, 25, 33, 28, 22</td><td>4, 2, 5, 3, 1</td><td><strong>15</strong></td></tr>
      <tr class="kaupang-bg"><td class="kaupang"><strong>Kaupang</strong></td><td>48, 55, 42, 50, 58</td><td>11, 14, 9, 12, 15</td><td><strong>61</strong></td></tr>
    </table>

    <div class="formula-box">
      <div class="formula">Verificação: ΣR = N(N+1)/2 = 16 × 17 / 2 = 136</div>
      <div class="calc-step">60 + 15 + 61 = <strong style="color:var(--success)">136 ✓</strong></div>
    </div>

    <button class="animate-btn" onclick="animateBars()">📊 Ver Barras dos Rank Sums</button>
    <div class="bar-chart" id="barChart1">
      <div class="bar-wrapper">
        <div class="bar" id="bar_birka" style="height:0;background:var(--birka-color)">
          <div class="bar-label birka">60</div>
        </div>
        <div class="bar-name birka">Birka</div>
      </div>
      <div class="bar-wrapper">
        <div class="bar" id="bar_hedeby" style="height:0;background:var(--hedeby-color)">
          <div class="bar-label hedeby">15</div>
        </div>
        <div class="bar-name hedeby">Hedeby</div>
      </div>
      <div class="bar-wrapper">
        <div class="bar" id="bar_kaupang" style="height:0;background:var(--kaupang-color)">
          <div class="bar-label kaupang">61</div>
        </div>
        <div class="bar-name kaupang">Kaupang</div>
      </div>
    </div>

    ${dlg('corvo','🐦‍⬛ Huginn provoca:','Hedeby ficou com a menor soma de ranks — seus colheiteiros estão entre os piores. Será que o teste vai confirmar a diferença?')}
  </div>`
});

// --- STEP 3: H Statistic ---
slides.push({
  title: 'Estatística H', partB: false,
  html: `
  <div class="card">
    <h2>🔥 Passo 3 — Estatística H de Kruskal-Wallis</h2>

    <div class="formula-box">
      <div class="formula">H = [12 / N(N+1)] × Σ(Rⱼ² / nⱼ) − 3(N+1)</div>
    </div>

    <button class="animate-btn" id="btnCalcH" onclick="animateH()">🧮 Calcular H passo a passo</button>
    <div id="hCalcSteps"></div>

    ${dlg('odin','🧙‍♂️ Odin Dinho','H segue aproximadamente uma distribuição <strong>χ²</strong> com <em>df = k − 1 = 2</em> graus de liberdade. Quanto maior H, maior a evidência de que os grupos diferem.')}
    ${dlg('corvo','🐦‍⬛ Muninn sussurra:','A lógica do Kruskal-Wallis: se os grupos fossem iguais, seus ranks médios seriam próximos. H mede o quanto os rank sums se afastam do esperado.')}
  </div>`
});

// --- STEP 4: Significance ---
slides.push({
  title: 'Significância', partB: false,
  html: `
  <div class="card">
    <h2>🎯 Passo 4 — Significância e Tamanho de Efeito</h2>

    <div class="formula-box">
      <div class="formula">H = 10.29 &nbsp;|&nbsp; χ²<sub>crítico</sub>(2, α=0.05) = 5.99</div>
      <div class="calc-step" style="color:var(--success)">10.29 > 5.99 → <strong>Rejeita H₀!</strong></div>
    </div>

    <div class="formula-box">
      <div class="formula">p = 0.0058</div>
      <div class="calc-step">p < 0.05 → Há diferença significativa entre as aldeias</div>
    </div>

    <h3>Tamanho de Efeito: η²<sub>H</sub></h3>
    <div class="formula-box">
      <div class="formula">η²<sub>H</sub> = (H − k + 1) / (N − k)</div>

// ========== ENGINE ==========
let currentStep = 0;
const totalSteps = slides.length;

function buildSlides() {
  const container = document.getElementById('slidesContainer');
  const indicator = document.getElementById('stepIndicator');
  slides.forEach((s, i) => {
    // Slide
    const div = document.createElement('div');
    div.className = 'slide' + (i === 0 ? ' active' : '');
    div.id = 'slide_' + i;
    div.innerHTML = s.html;
    container.appendChild(div);
    // Dot
    const dot = document.createElement('div');
    dot.className = 'step-dot' + (i === 0 ? ' active' : '') + (s.partB ? ' part-b' : '');
    dot.textContent = i;
    dot.title = s.title;
    dot.onclick = () => goToStep(i);
    indicator.appendChild(dot);
  });
  updateNav();
}

function goToStep(n) {
  if (n < 0 || n >= totalSteps) return;
  document.querySelectorAll('.slide').forEach(s => { s.classList.remove('active'); s.style.animation = ''; });
  document.querySelectorAll('.step-dot').forEach((d, i) => {
    d.classList.remove('active');
    if (i < n) d.classList.add('completed');
    else d.classList.remove('completed');
  });
  currentStep = n;
  const slide = document.getElementById('slide_' + n);
  slide.classList.add('active');
  slide.style.animation = 'none';
  slide.offsetHeight; // reflow
  slide.style.animation = 'fadeIn 0.4s ease forwards';
  document.querySelectorAll('.step-dot')[n].classList.add('active');
  updateNav();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function nextStep() { goToStep(currentStep + 1); }
function prevStep() { goToStep(currentStep - 1); }

function updateNav() {
  document.getElementById('btnPrev').disabled = currentStep === 0;
  document.getElementById('btnNext').disabled = currentStep === totalSteps - 1;
  document.getElementById('stepCounter').textContent = `Passo ${currentStep} / ${totalSteps - 1}`;
  document.getElementById('progressFill').style.width = ((currentStep / (totalSteps - 1)) * 100) + '%';
}

  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); nextStep(); }

});
