<style>
:root {

  --bg-card: #161b22;

body {

}

  height: 8px;

}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--odin-blue), var(--gold));

  transition: width 0.5s ease;
}

/* STEP CONTENT */

  min-height: 60vh;
  padding: 30px 0;
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

.step-title {
  font-family: 'Bangers', cursive;

.step-subtitle {

/* DIALOGUE BOXES */

  border-left: 4px solid;

.dialogue-box.odin {
  background: rgba(88,166,255,0.08);
  border-left-color: var(--odin-blue);
}
.dialogue-box.thor {
  background: rgba(248,81,73,0.08);
  border-left-color: var(--thor-red);
}
.dialogue-box.corvo {

  border-left-color: var(--corvo-purple);
}

.char-name {
  font-family: 'Permanent Marker', cursive;
  font-size: 1rem;

}
.char-name.odin { color: var(--odin-blue); }
.char-name.thor { color: var(--thor-red); }

.dialogue-text {

/* DATA TABLE */

  margin: 20px 0;
  font-size: 1rem;
}

.data-table th, .data-table td {

.data-table th {

  font-size: 0.95rem;

  color: var(--text-dim);

/* ANIMATED BAR */

.bar-wrapper {

.bar-label {

.anova-table th, .anova-table td {

/* APA BOX */
.apa-box {

/* NAVIGATION */

/* SIGNATURE */

/* ANIMATED NUMBER */

/* HIGHLIGHT */

/* NUMBER LINE */
.number-line-container {

<body>

<div class="container">
  <div class="progress-bar-container">
    <div class="progress-label" id="progressLabel">Passo 0 de 13</div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div class="step-content" id="stepContent"></div>

  <div class="nav-buttons">
    <button class="nav-btn" id="btnBack" onclick="goBack()" disabled>&#9664; Voltar</button>
    <button class="nav-btn primary" id="btnNext" onclick="goNext()">Avançar &#9654;</button>
  </div>

  <div class="signature">
    Prof. Dr. Leonardo Vils &middot; PPGA &middot; UNINOVE &middot; MTPQI &middot; 2026
  </div>
</div>

<script>
// ===== DATA =====
const clans = [
  { name: 'Fenrir', color: 'var(--fenrir-color)', hex: '#58a6ff', data: [23,25,20,27,25] },
  { name: 'Jörmungandr', color: 'var(--jormungandr-color)', hex: '#3fb950', data: [30,33,28,35,34] },
  { name: 'Hel', color: 'var(--hel-color)', hex: '#f85149', data: [18,22,19,17,24] }
];

const allData = clans.flatMap(c => c.data);
const N = allData.length; // 15
const k = clans.length;   // 3
const grandSum = allData.reduce((a,b) => a+b, 0); // 380
const grandMean = grandSum / N; // 25.3333...

const groupMeans = clans.map(c => c.data.reduce((a,b)=>a+b,0) / c.data.length);
// [24, 32, 20]

const nj = 5;

// SSB
const SSB = clans.reduce((sum, c, i) => sum + nj * Math.pow(groupMeans[i] - grandMean, 2), 0);
// 373.3333...

// SSW
const SSW_groups = clans.map((c, i) => c.data.reduce((sum, x) => sum + Math.pow(x - groupMeans[i], 2), 0));
// [28, 34, 34]
const SSW = SSW_groups.reduce((a,b) => a+b, 0); // 96

const SST = SSB + SSW; // 469.3333...

const df_b = k - 1;    // 2
const df_w = N - k;     // 12
const df_t = N - 1;     // 14

const MSB = SSB / df_b; // 186.6667
const MSW = SSW / df_w; // 8

const F_val = MSB / MSW; // 23.3333

const eta2 = SSB / SST;
const omega2 = (SSB - df_b * MSW) / (SST + MSW);

// p-value approximation using F distribution
function fDistPDF(x, d1, d2) {
  if (x <= 0) return 0;
  const a = d1/2, b = d2/2;
  const num = Math.pow(d1*x, a) * Math.pow(d2, b);
  const den = Math.pow(d1*x + d2, a+b);
  const beta = gammln(a) + gammln(b) - gammln(a+b);
  return (num/den) / (x * Math.exp(beta));
}

function gammln(x) {
  const c = [76.18009172947146,-86.50532032941677,24.01409824083091,
    -1.231739572450155,0.001208650973866179,-0.000005395239384953];
  let y = x, tmp = x + 5.5;
  tmp -= (x+0.5)*Math.log(tmp);
  let ser = 1.000000000190015;
  for(let j=0;j<6;j++) ser += c[j]/(++y);
  return -tmp + Math.log(2.5066282746310005*ser/x);
}

function fDistCDF(x, d1, d2) {
  // Numerical integration (Simpson's rule)
  if (x <= 0) return 0;
  const steps = 2000;
  const h = x / steps;
  let sum = fDistPDF(0.0001, d1, d2) + fDistPDF(x, d1, d2);
  for (let i = 1; i < steps; i++) {
    const xi = i * h;
    sum += (i % 2 === 0 ? 2 : 4) * fDistPDF(xi, d1, d2);
  }
  return (h/3) * sum;
}

const pValue = 1 - fDistCDF(F_val, df_b, df_w);

// Tukey HSD
const qCrit = 3.77; // q critical for k=3, df_w=12, alpha=0.05
const seMean = Math.sqrt(MSW / nj); // sqrt(8/5) = 1.2649

const tukeyPairs = [
  { a: 'Fenrir', b: 'Jörmungandr', diff: Math.abs(groupMeans[0]-groupMeans[1]), mA: groupMeans[0], mB: groupMeans[1] },
  { a: 'Fenrir', b: 'Hel', diff: Math.abs(groupMeans[0]-groupMeans[2]), mA: groupMeans[0], mB: groupMeans[2] },
  { a: 'Jörmungandr', b: 'Hel', diff: Math.abs(groupMeans[1]-groupMeans[2]), mA: groupMeans[1], mB: groupMeans[2] }
];

const HSD = qCrit * seMean; // critical difference

tukeyPairs.forEach(p => {
  p.q = p.diff / seMean;
  p.sig = p.q > qCrit;
});

function r(v, d=2) { return Number(v).toFixed(d); }
function r4(v) { return Number(v).toFixed(4); }

// ===== DIALOGUE HELPER =====
function dialogue(character, name, text) {
  return `<div class="dialogue-box ${character}">
    <div class="char-name ${character}">${name}</div>
    <div class="dialogue-text">${text}</div>
  </div>`;
}

// ===== STEP FUNCTIONS =====
const totalSteps = 14; // 0..13
let currentStep = 0;

function step0() {
  return `
    <div class="step-title">ANOVA de Um Fator: A Competição dos Clãs</div>
    <p>Três clãs viking &mdash; <span class="hl-blue">Fenrir</span>, <span class="hl-green">Jörmungandr</span> e <span class="hl-red">Hel</span> &mdash; competem na grande feira de Midgard. Cada clã enviou 5 mercadores. Odin Dinho registrou o lucro (em moedas de ouro) de cada um.</p>

    ${dialogue('odin', '🧙‍♂️ Odin Dinho', 'Será que os três clãs realmente diferem no lucro, ou é apenas variação aleatória? Vamos descobrir &mdash; calculando à mão, passo a passo.')}

    ${dialogue('thor', '⚡ ThorMento', 'Fácil! Olha as médias &mdash; claro que são diferentes! Fenrir faz 24, Jörmungandr faz 32, Hel faz 20. Pronto, resolvido!')}

    ${dialogue('odin', '🧙‍♂️ Odin Dinho', 'Calma, ThorMento. As médias amostrais <em>sempre</em> diferem um pouco. Precisamos separar o <strong>sinal</strong> do <strong>ruído</strong>. A ANOVA faz exatamente isso.')}

    <table class="data-table">
      <tr>
        <th></th>
        <th>Merc. 1</th><th>Merc. 2</th><th>Merc. 3</th><th>Merc. 4</th><th>Merc. 5</th>
        <th>Média</th>
      </tr>
      <tr class="fenrir">
        <td style="font-family:'Permanent Marker';color:var(--fenrir-color)">Fenrir</td>
        <td>23</td><td>25</td><td>20</td><td>27</td><td>25</td>
        <td style="font-family:'Permanent Marker'">24,00</td>
      </tr>
      <tr class="jormungandr">
        <td style="font-family:'Permanent Marker';color:var(--jormungandr-color)">Jörmungandr</td>
        <td>30</td><td>33</td><td>28</td><td>35</td><td>34</td>
        <td style="font-family:'Permanent Marker'">32,00</td>
      </tr>
      <tr class="hel">
        <td style="font-family:'Permanent Marker';color:var(--hel-color)">Hel</td>
        <td>18</td><td>22</td><td>19</td><td>17</td><td>24</td>
        <td style="font-family:'Permanent Marker'">20,00</td>
      </tr>
    </table>

    <p style="text-align:center;color:var(--text-dim);font-family:'Permanent Marker'">n = 5 mercadores por clã &middot; N = 15 total</p>
  `;
}

function step1() {
  function miniHist(clan, i) {
    const m = groupMeans[i];
    const vals = clan.data;
    const min = Math.min(...vals) - 2;
    const max = Math.max(...vals) + 2;
    const bins = {};
    vals.forEach(v => { bins[v] = (bins[v]||0) + 1; });
    const maxCount = Math.max(...Object.values(bins));
    let bars = '';
    Object.keys(bins).sort((a,b)=>a-b).forEach(v => {
      const h = (bins[v]/maxCount)*60;
      const x = ((v-min)/(max-min))*160 + 20;
      bars += `<rect x="${x-8}" y="${80-h}" width="16" height="${h}" fill="${clan.hex}" opacity="0.7" rx="2"/>`;
    });
    const mx = ((m-min)/(max-min))*160 + 20;
    bars += `<line x1="${mx}" y1="10" x2="${mx}" y2="85" stroke="${clan.hex}" stroke-width="2" stroke-dasharray="4"/>`;
    bars += `<text x="${mx}" y="98" fill="${clan.hex}" font-size="11" text-anchor="middle" font-family="Permanent Marker">x̄=${m}</text>`;
    return `<div class="hist-card">
      <div class="hist-title" style="color:${clan.hex}">${clan.name}</div>
      <svg viewBox="0 0 200 105" width="200">${bars}</svg>
    </div>`;
  }

  return `
    <div class="step-title">Passo 1: Pressupostos da ANOVA</div>

    ${dialogue('corvo', '🐦‍⬛ Muninn sussurra:', 'Antes de aplicar a ANOVA, três pressupostos precisam ser verificados:<br><br><strong>1. Independência:</strong> Os dados de cada mercador são independentes entre si.<br><strong>2. Normalidade:</strong> Os lucros dentro de cada clã seguem distribuição aproximadamente normal.<br><strong>3. Homocedasticidade:</strong> A variância dos lucros é semelhante entre os clãs.')}

    <div class="hist-row">
      ${clans.map((c,i) => miniHist(c,i)).join('')}
    </div>

    ${dialogue('odin', '🧙‍♂️ Odin Dinho', 'Com amostras pequenas (n=5), é difícil verificar normalidade visualmente. Na prática, usamos o teste de <strong>Shapiro-Wilk</strong> para normalidade e o teste de <strong>Levene</strong> para homocedasticidade. Mas a ANOVA é robusta a desvios moderados &mdash; especialmente com tamanhos de grupo iguais.')}

    ${dialogue('corvo', '🐦‍⬛ Huginn provoca:', 'E se os pressupostos falharem? Se a normalidade é violada com amostras pequenas, considere o teste de <strong>Kruskal-Wallis</strong> (não-paramétrico). Se as variâncias são muito desiguais, use a correção de <strong>Welch</strong>. Nunca assuma &mdash; sempre teste!')}
  `;
}

function step2() {
  return `
    <div class="step-title">Passo 2: Formulação das Hipóteses</div>

    <div class="formula">
      <div class="formula-label">Hipótese Nula</div>
      H₀: &mu;<sub>Fenrir</sub> = &mu;<sub>Jörmungandr</sub> = &mu;<sub>Hel</sub>
    </div>

    <div class="formula">
      <div class="formula-label">Hipótese Alternativa</div>
      H₁: Pelo menos um &mu;<sub>i</sub> &ne; &mu;<sub>j</sub>
    </div>

    ${dialogue('corvo', '🐦‍⬛ Muninn sussurra:', 'H₀ diz que as médias populacionais dos três clãs são iguais &mdash; qualquer diferença observada é puro acaso. H₁ diz que <em>pelo menos um</em> clã difere dos demais.')}

    ${dialogue('thor', '⚡ ThorMento', 'Basta olhar as médias! Fenrir=24, Jörmungandr=32, Hel=20. Óbvio que são diferentes!')}

    ${dialogue('odin', '🧙‍♂️ Odin Dinho', 'As médias <em>amostrais</em> sempre diferem, ThorMento. Mesmo que os três clãs fossem idênticos na população, as amostras produziriam médias ligeiramente diferentes. A questão é: a diferença observada é <strong>maior</strong> do que esperaríamos por puro acaso?')}

    <p style="text-align:center;margin-top:20px"><span class="hl-gold">&alpha; = 0,05</span> (nível de significância)</p>
  `;
}

function step3() {
  const allVals = allData.slice().sort((a,b)=>a-b);
  const minV = 15, maxV = 37;

  function xPos(v) { return 40 + ((v - minV)/(maxV - minV)) * 620; }

  let dots = '';
  clans.forEach((c, ci) => {
    c.data.forEach(v => {
      const x = xPos(v);
      const y = 55 + ci * 25;
      dots += `<circle cx="${x}" cy="${y}" r="6" fill="${c.hex}" opacity="0.8"><animate attributeName="cy" from="150" to="${y}" dur="0.6s" fill="freeze"/></circle>`;
    });
  });

  const gmx = xPos(grandMean);
  let meanMarkers = '';
  clans.forEach((c, ci) => {
    const mx = xPos(groupMeans[ci]);
    meanMarkers += `<line x1="${mx}" y1="42" x2="${mx}" y2="${65+ci*25}" stroke="${c.hex}" stroke-width="2" stroke-dasharray="3" opacity="0.6"/>`;
    meanMarkers += `<text x="${mx}" y="135" fill="${c.hex}" font-size="11" text-anchor="middle" font-family="Permanent Marker">${c.name}: ${groupMeans[ci]}</text>`;
  });

  return `
    <div class="step-title">Passo 3: Média Geral (Grand Mean)</div>

    <div class="formula">
      <div class="formula-label">Fórmula</div>
      X̄<sub>geral</sub> = &Sigma;X<sub>i</sub> / N = ${grandSum} / ${N} = <span class="hl-gold">${r(grandMean,4)}</span>
    </div>

    ${dialogue('odin', '🧙‍♂️ Odin Dinho', 'Somamos <em>todos</em> os 15 lucros e dividimos por 15. A média geral é o ponto de referência &mdash; o centro de gravidade de todos os dados.')}

    <div class="visual-container">
      <svg viewBox="0 0 700 160" width="700">
        <!-- axis -->
        <line x1="40" y1="40" x2="660" y2="40" stroke="var(--border)" stroke-width="1"/>
        ${[16,18,20,22,24,26,28,30,32,34,36].map(v =>
          `<text x="${xPos(v)}" y="30" fill="var(--text-dim)" font-size="10" text-anchor="middle">${v}</text>
           <line x1="${xPos(v)}" y1="36" x2="${xPos(v)}" y2="44" stroke="var(--border)" stroke-width="1"/>`
        ).join('')}
        ${dots}
        ${meanMarkers}
        <!-- grand mean -->
        <line x1="${gmx}" y1="20" x2="${gmx}" y2="130" stroke="var(--gold)" stroke-width="3" stroke-dasharray="6"/>
        <text x="${gmx}" y="15" fill="var(--gold)" font-size="12" text-anchor="middle" font-family="Bangers">GRAND MEAN = ${r(grandMean,2)}</text>
      </svg>
    </div>

    <p style="text-align:center;color:var(--text-dim)">Cada ponto = um mercador. Linha dourada = média geral.</p>
  `;
}

function step4() {
  let rows = '';
  let sstRunning = 0;
  let idx = 0;
  clans.forEach((c, ci) => {
    c.data.forEach((v, vi) => {
      const dev = v - grandMean;
      const sq = dev*dev;
      sstRunning += sq;
      rows += `<tr>
        <td style="color:${c.hex}">${c.name}</td>
        <td>${v}</td>
        <td>${r(dev,2)}</td>
        <td>${r(sq,2)}</td>
        <td>${r(sstRunning,2)}</td>
      </tr>`;
      idx++;
    });
  });

  return `
    <div class="step-title">Passo 4: SST &mdash; Soma dos Quadrados Total</div>

    <div class="formula">
      <div class="formula-label">Fórmula</div>
      SST = &Sigma;(X<sub>i</sub> &minus; X̄<sub>geral</sub>)&sup2;
    </div>

    ${dialogue('odin', '🧙‍♂️ Odin Dinho', 'A SST mede a variação <strong>total</strong> dos dados. Para cada mercador, calculamos quanto o lucro dele se desvia da média geral &mdash; e elevamos ao quadrado.')}

    <div style="overflow-x:auto">
    <table class="calc-table">
      <tr><th>Clã</th><th>X<sub>i</sub></th><th>X<sub>i</sub> &minus; ${r(grandMean,2)}</th><th>(desvio)&sup2;</th><th>Acumulado</th></tr>
      ${rows}
    </table>
    </div>

    <div class="formula" style="font-size:1.3rem">
      SST = <span class="hl-gold">${r(SST,2)}</span>
    </div>

    <div class="bar-container">
      <div class="bar-wrapper">
        <div class="bar-label" style="color:var(--gold)">SST</div>
        <div class="bar-track">
          <div class="bar-fill sst" id="sstBar" style="width:0%">${r(SST,2)}</div>
        </div>
      </div>
    </div>

    ${dialogue('corvo', '🐦‍⬛ Muninn sussurra:', 'A SST captura TODA a variação &mdash; tanto as diferenças entre os clãs quanto as diferenças entre mercadores do mesmo clã. Agora vamos separar essas duas fontes.')}
  `;
}

function step5() {
  const ssbParts = clans.map((c, i) => {
    const dev = groupMeans[i] - grandMean;
    return { name: c.name, color: c.hex, mean: groupMeans[i], dev: dev, sq: dev*dev, contrib: nj * dev * dev };
  });

  return `
    <div class="step-title">Passo 5: SSB &mdash; Variação Entre Grupos</div>

    <div class="formula">
      <div class="formula-label">Fórmula</div>
      SSB = &Sigma; n<sub>j</sub> &times; (X̄<sub>j</sub> &minus; X̄<sub>geral</sub>)&sup2;
    </div>

    ${dialogue('odin', '🧙‍♂️ Odin Dinho', 'Agora medimos o quanto cada <em>média de grupo</em> se desvia da média geral. Esta é a variação <strong>entre</strong> os clãs &mdash; o sinal que buscamos.')}

    <table class="calc-table">
      <tr><th>Clã</th><th>X̄<sub>j</sub></th><th>X̄<sub>j</sub> &minus; ${r(grandMean,2)}</th><th>(desvio)&sup2;</th><th>n<sub>j</sub> &times; (desvio)&sup2;</th></tr>
      ${ssbParts.map(p => `<tr>
        <td style="color:${p.color}">${p.name}</td>
        <td>${r(p.mean,2)}</td>
        <td>${r(p.dev,2)}</td>
        <td>${r(p.sq,2)}</td>
        <td>${r(p.contrib,2)}</td>
      </tr>`).join('')}
      <tr class="mean-row">
        <td colspan="4" style="text-align:right;font-family:'Permanent Marker';color:var(--gold)">SSB =</td>
        <td style="color:var(--gold)">${r(SSB,2)}</td>
      </tr>
    </table>

    <div class="visual-container">
      <svg viewBox="0 0 600 120" width="600">
        <!-- grand mean line -->
        <line x1="300" y1="10" x2="300" y2="110" stroke="var(--gold)" stroke-width="2" stroke-dasharray="5"/>
        <text x="300" y="8" fill="var(--gold)" font-size="11" text-anchor="middle" font-family="Permanent Marker">X̄ = ${r(grandMean,2)}</text>
        ${clans.map((c, i) => {
          const scale = 8;
          const baseX = 300;
          const targetX = baseX + (groupMeans[i] - grandMean) * scale;
          const y = 35 + i * 30;
          return `
            <line x1="${baseX}" y1="${y}" x2="${targetX}" y2="${y}" stroke="${c.hex}" stroke-width="4" marker-end="url(#arrow${i})">
              <animate attributeName="x2" from="${baseX}" to="${targetX}" dur="0.8s" fill="freeze"/>
            </line>
            <defs><marker id="arrow${i}" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="${c.hex}"/></marker></defs>
            <text x="${targetX + (groupMeans[i]>grandMean?8:-8)}" y="${y+4}" fill="${c.hex}" font-size="11" text-anchor="${groupMeans[i]>grandMean?'start':'end'}" font-family="Permanent Marker">${c.name} (${groupMeans[i]})</text>
          `;
        }).join('')}
      </svg>
    </div>

    <p style="text-align:center;color:var(--text-dim)">Setas: distância de cada média de grupo até a média geral</p>
  `;
}

function step6() {
  let tables = '';
  clans.forEach((c, i) => {
    let rows = '';
    let groupSSW = 0;
    c.data.forEach(v => {
      const dev = v - groupMeans[i];
      const sq = dev * dev;
      groupSSW += sq;
      rows += `<tr><td>${v}</td><td>${r(dev,2)}</td><td>${r(sq,2)}</td></tr>`;
    });
    rows += `<tr class="mean-row"><td colspan="2" style="text-align:right;color:${c.hex}">SSW<sub>${c.name}</sub> =</td><td style="color:${c.hex}">${r(groupSSW,2)}</td></tr>`;
    tables += `<div style="margin:14px 0"><div class="step-subtitle" style="color:${c.hex}">${c.name} (X̄ = ${groupMeans[i]})</div>
      <table class="calc-table">
        <tr><th>X<sub>i</sub></th><th>X<sub>i</sub> &minus; ${groupMeans[i]}</th><th>(desvio)&sup2;</th></tr>
        ${rows}
      </table></div>`;
  });

  const ssbPct = (SSB / SST * 100);
  const sswPct = (SSW / SST * 100);

  return `
    <div class="step-title">Passo 6: SSW &mdash; Variação Dentro dos Grupos</div>

    <div class="formula">
      <div class="formula-label">Fórmula</div>
      SSW = &Sigma;(X<sub>i</sub> &minus; X̄<sub>j</sub>)&sup2; &nbsp; (dentro de cada grupo)
    </div>

    ${tables}

    <div class="formula" style="font-size:1.2rem">
      SSW = ${SSW_groups.map((v,i) => `<span style="color:${clans[i].hex}">${r(v,2)}</span>`).join(' + ')} = <span class="hl-red">${r(SSW,2)}</span>
    </div>

    ${dialogue('thor', '⚡ ThorMento', 'Essa é a parte chata... muito número!')}
    ${dialogue('odin', '🧙‍♂️ Odin Dinho', 'Essa é a variação <strong>dentro</strong> dos grupos &mdash; o ruído. Mercadores do mesmo clã diferem entre si. Se esse ruído for pequeno comparado à variação entre clãs, temos um sinal forte.')}

    <div class="bar-container">
      <div class="bar-wrapper">
        <div class="bar-label" style="color:var(--odin-blue)">SSB</div>
        <div class="bar-track">
          <div class="bar-fill ssb" id="ssbBar2" style="width:${ssbPct}%">${r(SSB,2)}</div>
        </div>
      </div>
      <div class="bar-wrapper">
        <div class="bar-label" style="color:var(--thor-red)">SSW</div>
        <div class="bar-track">
          <div class="bar-fill ssw" id="sswBar2" style="width:${sswPct}%">${r(SSW,2)}</div>
        </div>
      </div>
      <div class="bar-wrapper">
        <div class="bar-label" style="color:var(--gold)">SST</div>
        <div class="bar-track">
          <div class="bar-fill sst" style="width:100%">${r(SST,2)}</div>
        </div>
      </div>
    </div>

    <div class="formula">
      <div class="formula-label">Verificação</div>
      SSB + SSW = ${r(SSB,2)} + ${r(SSW,2)} = ${r(SSB+SSW,2)} = SST &check;
    </div>
  `;
}

function step7() {
  return `
    <div class="step-title">Passo 7: Graus de Liberdade</div>

    ${dialogue('corvo', '🐦‍⬛ Muninn sussurra:', 'Graus de liberdade indicam quantos valores são "livres para variar" depois de fixarmos certas restrições (como a média).')}

    <div class="formula">
      <div class="formula-label">Entre Grupos</div>
      df<sub>entre</sub> = k &minus; 1 = ${k} &minus; 1 = <span class="hl-blue">${df_b}</span>
    </div>

    <div class="formula">
      <div class="formula-label">Dentro dos Grupos</div>
      df<sub>dentro</sub> = N &minus; k = ${N} &minus; ${k} = <span class="hl-red">${df_w}</span>
    </div>

    <div class="formula">
      <div class="formula-label">Total</div>
      df<sub>total</sub> = N &minus; 1 = ${N} &minus; 1 = <span class="hl-gold">${df_t}</span>
    </div>

    ${dialogue('odin', '🧙‍♂️ Odin Dinho', 'Pense assim: temos ${k} médias de grupo, mas para calcular a variação entre elas precisamos de apenas ${k}&minus;1 informações livres (a última é determinada pela média geral). Dentro dos grupos, cada grupo "perde" 1 grau de liberdade para sua própria média &mdash; ou seja, ${N} &minus; ${k} = ${df_w}.')}

    <div class="visual-container">
      <svg viewBox="0 0 500 80" width="500">
        <rect x="20" y="15" width="460" height="50" rx="8" fill="none" stroke="var(--gold)" stroke-width="2"/>
        <text x="250" y="10" fill="var(--gold)" font-size="12" text-anchor="middle" font-family="Permanent Marker">df total = ${df_t}</text>
        <rect x="25" y="20" width="${(df_b/df_t)*450}" height="40" rx="6" fill="var(--odin-blue)" opacity="0.3"/>
        <text x="${25 + (df_b/df_t)*450/2}" y="45" fill="var(--odin-blue)" font-size="13" text-anchor="middle" font-family="Permanent Marker">df_b = ${df_b}</text>
        <rect x="${25 + (df_b/df_t)*450}" y="20" width="${(df_w/df_t)*450}" height="40" rx="6" fill="var(--thor-red)" opacity="0.3"/>
        <text x="${25 + (df_b/df_t)*450 + (df_w/df_t)*450/2}" y="45" fill="var(--thor-red)" font-size="13" text-anchor="middle" font-family="Permanent Marker">df_w = ${df_w}</text>
      </svg>
    </div>

    <div class="formula">
      <div class="formula-label">Verificação</div>
      df<sub>entre</sub> + df<sub>dentro</sub> = ${df_b} + ${df_w} = ${df_t} = df<sub>total</sub> &check;
    </div>
  `;
}

function step8() {
  return `
    <div class="step-title">Passo 8: Quadrados Médios (Mean Squares)</div>

    ${dialogue('odin', '🧙‍♂️ Odin Dinho', 'Para comparar a variação entre e dentro dos grupos de forma justa, dividimos cada SS pelos seus graus de liberdade. Isso nos dá a variação <em>média</em> por grau de liberdade.')}

    <div class="formula">
      <div class="formula-label">Quadrado Médio Entre (MSB)</div>
      MSB = SSB / df<sub>entre</sub> = ${r(SSB,2)} / ${df_b} = <span class="hl-blue">${r(MSB,2)}</span>
    </div>

    <div class="formula">
      <div class="formula-label">Quadrado Médio Dentro (MSW)</div>
      MSW = SSW / df<sub>dentro</sub> = ${r(SSW,2)} / ${df_w} = <span class="hl-red">${r(MSW,2)}</span>
    </div>

    <div class="visual-container">
      <svg viewBox="0 0 600 130" width="600">
        <!-- MSB bar -->
        <text x="20" y="30" fill="var(--odin-blue)" font-size="13" font-family="Permanent Marker">MSB</text>
        <rect x="80" y="15" width="${(MSB/MSB)*400}" height="28" rx="6" fill="var(--odin-blue)" opacity="0.7">
          <animate attributeName="width" from="0" to="${(MSB/MSB)*400}" dur="1s" fill="freeze"/>
        </rect>
        <text x="${80 + (MSB/MSB)*400 + 10}" y="34" fill="var(--odin-blue)" font-size="13" font-family="Permanent Marker">${r(MSB,2)}</text>

        <!-- MSW bar -->
        <text x="20" y="80" fill="var(--thor-red)" font-size="13" font-family="Permanent Marker">MSW</text>
        <rect x="80" y="65" width="${(MSW/MSB)*400}" height="28" rx="6" fill="var(--thor-red)" opacity="0.7">
          <animate attributeName="width" from="0" to="${(MSW/MSB)*400}" dur="1s" fill="freeze"/>
        </rect>
        <text x="${80 + (MSW/MSB)*400 + 10}" y="84" fill="var(--thor-red)" font-size="13" font-family="Permanent Marker">${r(MSW,2)}</text>

        <text x="300" y="120" fill="var(--text-dim)" font-size="11" text-anchor="middle" font-family="Patrick Hand">MSB é ${r(MSB/MSW,1)}x maior que MSW!</text>
      </svg>
    </div>

    ${dialogue('corvo', '🐦‍⬛ Muninn sussurra:', 'MSB representa a variação média <strong>entre</strong> os clãs. MSW representa a variação média <strong>dentro</strong> dos clãs. Se H₀ for verdadeira, ambos estimam a mesma coisa e o MSB/MSW deveria ser ~1.')}
  `;
}

function step9() {
  // Build F distribution curve as SVG path
  const d1 = df_b, d2 = df_w;
  const maxX = 35;
  const steps = 200;
  let pathPoints = [];
  let maxY = 0;

  for (let i = 0; i <= steps; i++) {
    const x = (i / steps) * maxX;
    const y = fDistPDF(x + 0.01, d1, d2);
    if (y > maxY) maxY = y;
    pathPoints.push({ x, y });
  }

  const svgW = 600, svgH = 200, padL = 50, padR = 20, padT = 20, padB = 40;
  const plotW = svgW - padL - padR;
  const plotH = svgH - padT - padB;

  function sx(v) { return padL + (v / maxX) * plotW; }
  function sy(v) { return padT + plotH - (v / (maxY * 1.1)) * plotH; }

  let curvePath = `M ${sx(pathPoints[0].x)} ${sy(pathPoints[0].y)}`;
  pathPoints.forEach(p => { curvePath += ` L ${sx(p.x)} ${sy(p.y)}`; });

  // Shaded rejection region (approximate F critical for alpha=0.05, df=2,12 is ~3.89)
  const fCrit = 3.89;
  let shadePath = `M ${sx(fCrit)} ${sy(0)}`;
  pathPoints.filter(p => p.x >= fCrit).forEach(p => { shadePath += ` L ${sx(p.x)} ${sy(p.y)}`; });
  shadePath += ` L ${sx(maxX)} ${sy(0)} Z`;

  const fX = sx(F_val);
  const fY = sy(fDistPDF(F_val, d1, d2));

  return `
    <div class="step-title">Passo 9: A Razão F</div>

    <div class="formula">
      <div class="formula-label">A Grande Divisão</div>
      F = MSB / MSW = ${r(MSB,2)} / ${r(MSW,2)} = <span class="hl-gold" style="font-size:1.5rem">${r(F_val,2)}</span>
    </div>

    ${dialogue('odin', '🧙‍♂️ Odin Dinho', 'Se F fosse ~1, a variação entre clãs seria igual à variação dentro &mdash; sem sinal. Mas F = ${r(F_val,2)} significa que a variação entre clãs é <strong>${r(F_val,1)} vezes</strong> maior que a variação dentro. Isso é sinal forte!')}

    <div class="visual-container">
      <svg viewBox="0 0 ${svgW} ${svgH}" width="${svgW}">
        <!-- axes -->
        <line x1="${padL}" y1="${padT+plotH}" x2="${padL+plotW}" y2="${padT+plotH}" stroke="var(--text-dim)" stroke-width="1"/>
        <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+plotH}" stroke="var(--text-dim)" stroke-width="1"/>

        <!-- x labels -->
        ${[0,5,10,15,20,25,30].map(v => `<text x="${sx(v)}" y="${padT+plotH+20}" fill="var(--text-dim)" font-size="10" text-anchor="middle">${v}</text>`).join('')}
        <text x="${svgW/2}" y="${svgH-2}" fill="var(--text-dim)" font-size="11" text-anchor="middle" font-family="Permanent Marker">Valor F</text>

        <!-- shade rejection region -->
        <path d="${shadePath}" fill="var(--thor-red)" opacity="0.25"/>

        <!-- curve -->
        <path d="${curvePath}" fill="none" stroke="var(--odin-blue)" stroke-width="2.5"/>

        <!-- F critical line -->
        <line x1="${sx(fCrit)}" y1="${padT}" x2="${sx(fCrit)}" y2="${padT+plotH}" stroke="var(--thor-red)" stroke-width="1.5" stroke-dasharray="5"/>
        <text x="${sx(fCrit)}" y="${padT-4}" fill="var(--thor-red)" font-size="10" text-anchor="middle" font-family="Permanent Marker">F crit = ${fCrit}</text>

        <!-- F observed -->
        <line x1="${fX}" y1="${padT}" x2="${fX}" y2="${padT+plotH}" stroke="var(--gold)" stroke-width="2.5"/>
        <circle cx="${fX}" cy="${padT+plotH}" r="5" fill="var(--gold)"/>
        <text x="${fX+5}" y="${padT+15}" fill="var(--gold)" font-size="12" font-family="Bangers">F = ${r(F_val,2)}</text>

        <!-- label -->
        <text x="${sx(fCrit)+40}" y="${padT+plotH-10}" fill="var(--thor-red)" font-size="9" opacity="0.8">Rejeitar H₀</text>
      </svg>
    </div>

    <div class="formula">
      <div class="formula-label">Decisão</div>
      F(${df_b}, ${df_w}) = ${r(F_val,2)} &nbsp; | &nbsp; F<sub>crit</sub>(0,05) = ${fCrit} &nbsp; | &nbsp; p &lt; 0,001
    </div>

    ${dialogue('odin', '🧙‍♂️ Odin Dinho', 'F = ${r(F_val,2)} está muito além do F crítico (${fCrit}). O p-valor é menor que 0,001. <strong>Rejeitamos H₀</strong> &mdash; os clãs diferem significativamente no lucro!')}

    ${dialogue('thor', '⚡ ThorMento', 'Eu sabia! Eu falei que eram diferentes!')}

    ${dialogue('odin', '🧙‍♂️ Odin Dinho', 'Mas AGORA sabemos com rigor estatístico, ThorMento. Não é mais achismo.')}
  `;
}

function step10() {
  return `
    <div class="step-title">Passo 10: Tabela ANOVA Completa</div>

    ${dialogue('odin', '🧙‍♂️ Odin Dinho', 'Hora de consolidar tudo numa tabela de resumo &mdash; o formato padrão que você encontra em qualquer artigo ou software.')}

    <table class="anova-table">
      <tr>
        <th>Fonte</th>
        <th>SS</th>
        <th>df</th>
        <th>MS</th>
        <th>F</th>
        <th>p</th>
      </tr>
      <tr>
        <td style="font-family:'Permanent Marker';color:var(--odin-blue)">Entre (Between)</td>
        <td>${r(SSB,2)}</td>
        <td>${df_b}</td>
        <td>${r(MSB,2)}</td>
        <td class="highlight">${r(F_val,2)}</td>
        <td class="highlight">&lt; 0,001</td>
      </tr>
      <tr>
        <td style="font-family:'Permanent Marker';color:var(--thor-red)">Dentro (Within)</td>
        <td>${r(SSW,2)}</td>
        <td>${df_w}</td>
        <td>${r(MSW,2)}</td>
        <td>&mdash;</td>
        <td>&mdash;</td>
      </tr>
      <tr>
        <td style="font-family:'Permanent Marker';color:var(--gold)">Total</td>
        <td>${r(SST,2)}</td>
        <td>${df_t}</td>
        <td>&mdash;</td>
        <td>&mdash;</td>
        <td>&mdash;</td>
      </tr>
    </table>

    <div class="apa-box">
      <div class="apa-label">Formato APA</div>
      <em>F</em>(${df_b}, ${df_w}) = ${r(F_val,2)}, <em>p</em> &lt; 0,001, &omega;&sup2; = ${r(omega2,2)}
    </div>

    ${dialogue('corvo', '🐦‍⬛ Muninn sussurra:', 'Essa tabela é a "certidão de nascimento" da sua ANOVA. Guarde-a &mdash; todo artigo científico exige esse formato.')}
  `;
}

function step11() {
  const eta2Pct = (eta2 * 100);
  const omega2Pct = (omega2 * 100);
  const residPct = 100 - omega2Pct;

  // Pie chart using SVG arcs
  const r2 = 80;
  const cx = 150, cy = 100;
  function polarToCart(cx, cy, r, angle) {
    const rad = (angle - 90) * Math.PI / 180;
    return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
  }
  function arc(cx, cy, r, startAngle, endAngle, color) {
    const start = polarToCart(cx, cy, r, endAngle);
    const end = polarToCart(cx, cy, r, startAngle);
    const largeArc = endAngle - startAngle > 180 ? 1 : 0;
    return `<path d="M ${cx} ${cy} L ${start.x} ${start.y} A ${r} ${r} 0 ${largeArc} 0 ${end.x} ${end.y} Z" fill="${color}" opacity="0.8"/>`;
  }

  const omega2Angle = omega2Pct * 3.6;

  return `
    <div class="step-title">Passo 11: Tamanho de Efeito</div>

    ${dialogue('odin', '🧙‍♂️ Odin Dinho', 'Não basta saber SE os clãs diferem &mdash; precisamos saber <strong>QUANTO</strong>. O tamanho de efeito nos diz que proporção da variação total é explicada pela diferença entre clãs.')}

    <div class="formula">
      <div class="formula-label">Eta-quadrado (&eta;&sup2;)</div>
      &eta;&sup2; = SSB / SST = ${r(SSB,2)} / ${r(SST,2)} = <span class="hl-gold">${r(eta2,4)}</span> (${r(eta2Pct,1)}%)
    </div>

    <div class="formula">
      <div class="formula-label">Ômega-quadrado (&omega;&sup2;) &mdash; menos enviesado</div>
      &omega;&sup2; = (SSB &minus; df<sub>b</sub> &times; MSW) / (SST + MSW)<br>
      &omega;&sup2; = (${r(SSB,2)} &minus; ${df_b} &times; ${r(MSW,2)}) / (${r(SST,2)} + ${r(MSW,2)})<br>
      &omega;&sup2; = ${r(SSB - df_b*MSW,2)} / ${r(SST + MSW,2)} = <span class="hl-gold">${r(omega2,4)}</span> (${r(omega2Pct,1)}%)
    </div>

    <div class="visual-container">
      <svg viewBox="0 0 300 210" width="300">
        ${arc(cx, cy, r2, 0, omega2Angle, '#58a6ff')}
        ${arc(cx, cy, r2, omega2Angle, 360, '#f85149')}
        <circle cx="${cx}" cy="${cy}" r="30" fill="var(--bg-dark)"/>
        <text x="${cx}" y="${cy+4}" fill="var(--gold)" font-size="13" text-anchor="middle" font-family="Bangers">&omega;&sup2;</text>
      </svg>
    </div>

    <div class="pie-legend">
      <div class="pie-legend-item"><div class="pie-swatch" style="background:var(--odin-blue)"></div> Clã (${r(omega2Pct,1)}%)</div>
      <div class="pie-legend-item"><div class="pie-swatch" style="background:var(--thor-red)"></div> Resíduo (${r(residPct,1)}%)</div>
    </div>

    ${dialogue('corvo', '🐦‍⬛ Muninn sussurra:', '&eta;&sup2; tende a superestimar o efeito (é enviesado). &omega;&sup2; corrige esse viés e é preferível. Ambos indicam um efeito <strong>grande</strong> &mdash; o clã explica ~${r(omega2Pct,0)}% da variação no lucro!')}

    ${dialogue('corvo', '🐦‍⬛ Huginn provoca:', 'Referência de Cohen para &eta;&sup2;: pequeno = 0,01; médio = 0,06; grande = 0,14. O nosso ${r(eta2,2)} está <em>muito</em> acima de grande!')}
  `;
}

function step12() {
  return `
    <div class="step-title">Passo 12: Comparações Post-Hoc (Tukey HSD)</div>

    ${dialogue('odin', '🧙‍♂️ Odin Dinho', 'A ANOVA nos disse que os clãs diferem, mas <em>não</em> diz QUAIS clãs diferem entre si. Para isso, precisamos de comparações post-hoc.')}

    ${dialogue('thor', '⚡ ThorMento', 'Ora, Jörmungandr é o melhor, óbvio!')}

    ${dialogue('odin', '🧙‍♂️ Odin Dinho', 'Calma. Vamos testar par a par com o <strong>Tukey HSD</strong> (Honestly Significant Difference). Ele controla o erro Tipo I ao fazer múltiplas comparações.')}

    <div class="formula">
      <div class="formula-label">Diferença Mínima Significativa</div>
      HSD = q<sub>crit</sub> &times; &radic;(MSW / n) = ${qCrit} &times; &radic;(${r(MSW,2)} / ${nj}) = ${qCrit} &times; ${r(seMean,4)} = <span class="hl-gold">${r(HSD,2)}</span>
    </div>

    <p style="text-align:center;color:var(--text-dim);margin-bottom:10px">q<sub>crit</sub>(k=${k}, df=${df_w}, &alpha;=0,05) = ${qCrit}</p>

    <div class="comparison-grid">
      ${tukeyPairs.map(p => `
        <div class="comparison-card ${p.sig ? 'significant' : 'not-significant'}">
          <div class="comparison-title">${p.a} vs ${p.b}</div>
          <p>|${r(p.mA,0)} &minus; ${r(p.mB,0)}| = <strong>${r(p.diff,2)}</strong></p>
          <p>q = ${r(p.diff,2)} / ${r(seMean,4)} = ${r(p.q,2)}</p>
          <div class="comparison-result ${p.sig ? 'sig' : 'nsig'}">
            ${p.sig ? '&#10003; Significativo' : '&#10007; Não Significativo'}
          </div>
          <p style="font-size:0.85rem;color:var(--text-dim)">${p.diff > HSD ? `${r(p.diff,2)} > ${r(HSD,2)}` : `${r(p.diff,2)} < ${r(HSD,2)}`}</p>
        </div>
      `).join('')}
    </div>

    ${dialogue('odin', '🧙‍♂️ Odin Dinho', `Resultado: Jörmungandr difere significativamente dos outros dois clãs. Entretanto, a diferença entre Fenrir e Hel <em>não</em> atingiu significância pelo Tukey HSD. A diferença de 4 moedas entre eles é menor que o HSD crítico de ${r(HSD,2)}.`)}

    ${dialogue('corvo', '🐦‍⬛ Huginn provoca:', 'E se nem todas fossem significativas? Nesse caso, só poderíamos afirmar diferença entre os pares que passaram no teste. A ANOVA diz "existe diferença", mas o post-hoc mostra <em>onde</em>.')}
  `;
}

function step13() {
  return `
    <div class="step-title">Passo 13: Conclusão e Relatório</div>

    <div class="apa-box">
      <div class="apa-label">Relatório APA</div>
      Uma ANOVA de um fator revelou diferença estatisticamente significativa no lucro dos mercadores entre os três clãs viking, <em>F</em>(${df_b}, ${df_w}) = ${r(F_val,2)}, <em>p</em> &lt; 0,001, &omega;&sup2; = ${r(omega2,2)}. Comparações post-hoc com o teste de Tukey HSD indicaram que o Clã Jörmungandr (<em>M</em> = 32,00) obteve lucro significativamente maior que o Clã Fenrir (<em>M</em> = 24,00) e o Clã Hel (<em>M</em> = 20,00). A diferença entre Fenrir e Hel não atingiu significância estatística (<em>q</em> = 3,16 &lt; <em>q</em><sub>crit</sub> = ${qCrit}). O tamanho de efeito foi grande (&omega;&sup2; = ${r(omega2,2)}), indicando que a pertença ao clã explica aproximadamente ${r(omega2*100,0)}% da variação no lucro.
    </div>

    <div class="licao-box">
      <div class="licao-title">Lição dos Corvos</div>

      ${dialogue('corvo', '🐦‍⬛ Muninn sussurra:', `<strong>Pontos-chave:</strong><br>
        &bull; ANOVA compara variação <em>entre</em> grupos vs. <em>dentro</em> dos grupos<br>
        &bull; F = MSB / MSW &mdash; sinal dividido pelo ruído<br>
        &bull; SST = SSB + SSW (decomposição da variância total)<br>
        &bull; Pressupostos: independência, normalidade, homocedasticidade<br>
        &bull; Rejeitar H₀ &ne; saber quais grupos diferem &rarr; post-hoc!<br>
        &bull; Sempre reporte tamanho de efeito (&omega;&sup2; preferível a &eta;&sup2;)`)}

      ${dialogue('corvo', '🐦‍⬛ Huginn provoca:', `<strong>Desafios para você:</strong><br>
        &bull; E se os tamanhos de grupo fossem desiguais?<br>
        &bull; O que acontece se adicionarmos um 4&ordm; clã?<br>
        &bull; Quando a ANOVA NÃO é a melhor escolha?<br>
        &bull; Qual a diferença entre &eta;&sup2; parcial e &eta;&sup2; total?<br>
        &bull; Quando usar Welch-ANOVA em vez da ANOVA clássica?`)}
    </div>

    ${dialogue('odin', '🧙‍♂️ Odin Dinho', 'Lembre-se: a ANOVA é apenas o começo. Ela nos diz <em>se</em> existe diferença. O post-hoc diz <em>onde</em>. O tamanho de efeito diz <em>quanto</em>. E o intervalo de confiança diz <em>com que precisão</em>. Use todos esses ingredientes na sua receita estatística!')}

    <div style="text-align:center;margin:30px 0">
      <div style="font-family:'Bangers';font-size:2rem;color:var(--gold)">FIM DA RECEITA!</div>
      <p style="color:var(--text-dim);margin-top:8px">ANOVA de Um Fator &mdash; calculada à mão, passo a passo.</p>
    </div>
  `;
}

// ===== STEP REGISTRY =====
const stepFunctions = [step0, step1, step2, step3, step4, step5, step6, step7, step8, step9, step10, step11, step12, step13];

const stepNames = [
  'Introdução',
  'Pressupostos',
  'Hipóteses',
  'Média Geral',
  'SST (Total)',
  'SSB (Entre)',
  'SSW (Dentro)',
  'Graus de Liberdade',
  'Quadrados Médios',
  'Razão F',
  'Tabela ANOVA',
  'Tamanho de Efeito',
  'Post-Hoc (Tukey)',
  'Conclusão'
];

// ===== NAVIGATION =====
function renderStep() {
  const content = document.getElementById('stepContent');
  content.innerHTML = stepFunctions[currentStep]();
  content.style.animation = 'none';
  content.offsetHeight; // trigger reflow
  content.style.animation = 'fadeIn 0.4s ease';

  document.getElementById('progressLabel').textContent = `Passo ${currentStep} de ${totalSteps - 1} — ${stepNames[currentStep]}`;
  document.getElementById('progressFill').style.width = `${(currentStep / (totalSteps - 1)) * 100}%`;

  document.getElementById('btnBack').disabled = currentStep === 0;
  document.getElementById('btnNext').textContent = currentStep === totalSteps - 1 ? 'Recomeçar ↻' : 'Avançar ▶';

  // Animate bars after render
  setTimeout(() => {
    const sstBar = document.getElementById('sstBar');
    if (sstBar) sstBar.style.width = '100%';
  }, 300);

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goNext() {
  if (currentStep >= totalSteps - 1) {
    currentStep = 0;
  } else {
    currentStep++;
  }
  renderStep();
}

function goBack() {
  if (currentStep > 0) {
    currentStep--;
    renderStep();
  }
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goNext(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); goBack(); }
});

// Initialize
renderStep();
</script>
</body>
